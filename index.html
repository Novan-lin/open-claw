<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard analisis saham real-time dengan indikator teknikal dan analisis AI" />
  <title>Stock Analyzer — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ====== RESET & BASE ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0d14;
      --surface:    #111520;
      --surface-2:  #181e2e;
      --border:     rgba(255,255,255,0.07);
      --border-2:   rgba(255,255,255,0.12);

      --buy:        #00d97e;
      --buy-dim:    rgba(0, 217, 126, 0.12);
      --sell:       #ff4d6d;
      --sell-dim:   rgba(255, 77, 109, 0.12);
      --hold:       #6c7af0;
      --hold-dim:   rgba(108, 122, 240, 0.12);

      --accent:     #6c7af0;
      --accent-dim: rgba(108, 122, 240, 0.15);
      --gold:       #f5c518;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;

      --radius:     16px;
      --radius-sm:  10px;
      --shadow:     0 4px 32px rgba(0,0,0,0.5);
      --glow-buy:   0 0 24px rgba(0, 217, 126, 0.2);
      --glow-sell:  0 0 24px rgba(255, 77, 109, 0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ====== ANIMATED BG ====== */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(108,122,240,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 85% 75%, rgba(0,217,126,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ====== HEADER ====== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,13,20,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #00d97e);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 16px;
    }
    .logo-text {
      font-size: 17px; font-weight: 700;
      background: linear-gradient(90deg, var(--text), #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex; align-items: center; gap: 12px;
    }

    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.4s;
    }
    #status-dot.live { background: var(--buy); box-shadow: 0 0 8px var(--buy); }
    #status-dot.loading { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    #status-dot.error  { background: var(--sell); }

    #status-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* countdown ring */
    #refresh-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border-2); stroke-width: 2.5; }
    .ring-fg {
      fill: none; stroke: var(--accent); stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 50.27;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    #countdown-label {
      font-size: 11px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      min-width: 20px;
    }

    /* ====== MAIN CONTENT ====== */
    main {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ====== TRADING PERFORMANCE ====== */
    #perf-section {
      margin-bottom: 28px;
    }

    .perf-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .perf-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #f5c518, #f59e0b);
      border-radius: 6px;
      display: grid; place-items: center;
      font-size: 12px; flex-shrink: 0;
    }
    .perf-title {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted);
    }
    .perf-line { flex: 1; height: 1px; background: var(--border); }

    #perf-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .perf-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .perf-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #f5c518, #f59e0b);
      opacity: 0.7;
    }
    .perf-card:hover { border-color: var(--border-2); }

    .perf-card-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.7px;
    }
    .perf-card-value {
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px;
      font-family: 'JetBrains Mono', monospace;
    }
    .perf-card-value.neutral { color: var(--text); }
    .perf-card-value.positive { color: var(--buy); }
    .perf-card-value.negative { color: var(--sell); }

    @media (max-width: 600px) {
      #perf-bar { grid-template-columns: 1fr; }
    }

    /* ====== STATS BAR ====== */
    #stats-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .stat-value { font-size: 22px; font-weight: 700; }

    /* ====== SECTION HEADER ====== */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted);
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ====== CARDS GRID ====== */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ====== SIGNAL CARD ====== */
    .signal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: fadeIn 0.4s ease both;
    }
    .signal-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-2);
    }
    .signal-card.BUY { border-top: 3px solid var(--buy); box-shadow: var(--glow-buy); }
    .signal-card.SELL { border-top: 3px solid var(--sell); box-shadow: var(--glow-sell); }
    .signal-card.HOLD { border-top: 3px solid var(--hold); }

    .card-header {
      padding: 20px 22px 14px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
    }
    .card-left { display: flex; flex-direction: column; gap: 4px; }
    .card-rank {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .card-ticker {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text), #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .card-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .badge-signal {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge-signal.BUY  { background: var(--buy-dim);  color: var(--buy); }
    .badge-signal.SELL { background: var(--sell-dim); color: var(--sell); }
    .badge-signal.HOLD { background: var(--hold-dim); color: var(--hold); }

    /* ====== METRICS ROW ====== */
    .card-metrics {
      padding: 0 22px 16px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .metric-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px;
    }
    .metric-chip .label { color: var(--text-muted); }
    .metric-chip .value { font-weight: 600; }

    /* ====== RANK BADGE ====== */
    .rank-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px 0;
      margin-bottom: -4px;
    }
    .rank-medal { font-size: 20px; line-height: 1; }
    .rank-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .rank-badge.rank-1 .rank-label { color: #ffd700; }
    .rank-badge.rank-2 .rank-label { color: #c0c0c0; }
    .rank-badge.rank-3 .rank-label { color: #cd7f32; }

    /* ====== SCORE BAR ====== */
    .score-bar-wrap {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 22px 10px;
    }
    .score-bar-track {
      flex: 1; height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .score-bar-label {
      font-size: 11px; white-space: nowrap;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .score-bar-label strong { color: var(--text); }

    /* ====== BADGE FEATURE (Smart Money & Gap Up) ====== */
    .badge-feature {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.2s;
    }
    .badge-feature strong { font-weight: 700; }
    .badge-feature .feat-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: 2px;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-feature .feat-off { color: var(--text-muted); }

    /* Smart Money ON */
    .sm-on {
      background: rgba(245,197,24,0.08);
      border-color: rgba(245,197,24,0.3);
      color: #f5c518;
    }
    .sm-on strong { color: #f5c518; }

    /* Gap Up ON */
    .gu-on {
      background: rgba(0,217,126,0.08);
      border-color: rgba(0,217,126,0.3);
      color: var(--buy);
    }
    .gu-on strong { color: var(--buy); }

    /* OFF state */
    .sm-off, .gu-off { opacity: 0.45; }

    /* Gate Decision Badge */
    .gate-execute {
      background: rgba(0,217,126,0.12);
      border-color: rgba(0,217,126,0.4);
      color: var(--buy);
    }
    .gate-execute strong { color: var(--buy); }
    .gate-wait {
      background: rgba(245,197,24,0.12);
      border-color: rgba(245,197,24,0.4);
      color: #f5c518;
    }
    .gate-wait strong { color: #f5c518; }
    .gate-skip {
      background: rgba(255,59,48,0.12);
      border-color: rgba(255,59,48,0.4);
      color: var(--sell);
    }
    .gate-skip strong { color: var(--sell); }
    .gate-none { opacity: 0.45; }


    /* ====== DIVIDER ====== */
    .card-divider { height: 1px; background: var(--border); margin: 0 22px; }

    /* ====== TRADE PLAN ====== */
    .trade-plan {
      margin: 0 22px 16px;
      padding: 14px 0 0;
    }
    .trade-plan-label {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .trade-plan-values {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .trade-plan-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .trade-plan-item .label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .trade-plan-item .value {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trade-plan-item.tp .value { color: var(--buy); }
    .trade-plan-item.sl .value { color: var(--sell); }

    /* ====== AI ANALYSIS ====== */
    .card-ai {
      padding: 14px 22px 20px;
    }
    .ai-label {
      font-size: 10px; font-weight: 700;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .ai-label::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .ai-text {
      font-size: 13px; line-height: 1.7;
      color: var(--text-dim);
    }

    /* ====== REASON TAGS on cards ====== */
    .reason-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 0 22px;
    }
    .reason-tag {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      padding: 3px 9px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.2px;
    }
    .reason-tag.positive {
      background: var(--buy-dim);
      border-color: rgba(0,217,126,0.25);
      color: var(--buy);
    }
    .reason-tag.negative {
      background: var(--sell-dim);
      border-color: rgba(255,77,109,0.25);
      color: var(--sell);
    }

    /* ====== AI SUMMARY on card ====== */
    .card-ai-summary {
      padding: 10px 22px 4px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ====== RSI color helpers ====== */
    .rsi-ob { color: var(--sell) !important; }
    .rsi-os { color: var(--buy) !important; }
    .rsi-neutral { color: var(--text) !important; }

    /* ====== Price note ====== */
    .price-note {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 0 0;
    }

    /* ====== MTF (Multi-Timeframe) ====== */
    .mtf-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
    }
    .mtf-badge.mtf-strong-buy  { background: var(--buy-dim); border-color: rgba(0,217,126,0.35); color: var(--buy); }
    .mtf-badge.mtf-buy         { background: rgba(0,217,126,0.08); border-color: rgba(0,217,126,0.2); color: var(--buy); }
    .mtf-badge.mtf-strong-sell { background: var(--sell-dim); border-color: rgba(255,77,109,0.35); color: var(--sell); }
    .mtf-badge.mtf-sell        { background: rgba(255,77,109,0.08); border-color: rgba(255,77,109,0.2); color: var(--sell); }
    .mtf-badge.mtf-conflict    { background: rgba(245,197,24,0.1); border-color: rgba(245,197,24,0.3); color: var(--gold); }
    .mtf-badge.mtf-neutral     { background: var(--accent-dim); border-color: rgba(108,122,240,0.2); color: var(--accent); }

    .mtf-tf-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .mtf-tf-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .mtf-tf-details {
      display: flex; gap: 10px; flex-wrap: wrap;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .mtf-tf-details span { color: var(--text-dim); }
    .mtf-bias-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.3px;
    }
    .mtf-bias-tag.bull { background: var(--buy-dim); color: var(--buy); }
    .mtf-bias-tag.bear { background: var(--sell-dim); color: var(--sell); }
    .mtf-bias-tag.neut { background: var(--accent-dim); color: var(--accent); }

    /* ====== EMPTY / LOADING / ERROR STATES ====== */
    .state-block {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .state-block .emoji { font-size: 40px; margin-bottom: 16px; }
    .state-block p { font-size: 14px; line-height: 1.7; }

    .skeleton { animation: shimmer 1.6s infinite; }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ====== MARKET STATUS BANNER ====== */
    #market-banner {
      margin-bottom: 16px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #market-banner.open {
      background: var(--buy-dim);
      border: 1px solid rgba(0,217,126,0.25);
      color: var(--buy);
    }
    #market-banner.closed {
      background: rgba(108,122,240,0.1);
      border: 1px solid rgba(108,122,240,0.2);
      color: var(--text-dim);
    }

    /* ====== TIMESTAMP ====== */
    #last-update {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 32px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ====== FILTER TOOLBAR ====== */
    .filter-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .filter-group {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .filter-btn.active-buy {
      background: var(--buy-dim);
      border-color: var(--buy);
      color: var(--buy);
    }
    .filter-btn.active-sell {
      background: var(--sell-dim);
      border-color: var(--sell);
      color: var(--sell);
    }
    .filter-btn .filter-count {
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .toggle-btn {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
    .toggle-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ====== DETAIL MODAL ====== */
    .modal-overlay {

<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-inner">

  <!-- Stats Bar -->
  <div id="stats-bar">

          <button class="interval-btn" data-interval="5"   onclick="setInterval_('5')">5m</button>

          <button class="interval-btn" data-interval="60"  onclick="setInterval_('60')">1h</button>

        <!-- Stock dropdown -->
        <div class="select-wrap">

            <option value="IDX:BBCA">BBCA — Bank Central Asia</option>

</main>

<script>
  /* ───────────────────────────────────────────
     COUNTDOWN + RING ANIMATION
  ─────────────────────────────────────────── */
  const REFRESH_INTERVAL = 300; // detik (5 menit)
  const CIRCUMFERENCE = 2 * Math.PI * 8; // r=8  ≈ 50.27

  const ringFg         = document.getElementById('ring-fg');
  const countdownLabel = document.getElementById('countdown-label');
  const statusDot      = document.getElementById('status-dot');
  const statusLabel    = document.getElementById('status-label');
  const lastUpdate     = document.getElementById('last-update');

  ringFg.style.strokeDasharray  = CIRCUMFERENCE;
  ringFg.style.strokeDashoffset = '0';

  let secondsLeft = REFRESH_INTERVAL;

  function tickCountdown() {
    secondsLeft--;
    if (secondsLeft < 0) secondsLeft = REFRESH_INTERVAL;

    countdownLabel.textContent = secondsLeft;
    const offset = CIRCUMFERENCE * (1 - secondsLeft / REFRESH_INTERVAL);
    ringFg.style.strokeDashoffset = offset;

    if (secondsLeft === 0) fetchSignals();
  }

  setInterval(tickCountdown, 1000);

  /* ───────────────────────────────────────────
     FETCH & RENDER
  ─────────────────────────────────────────── */
  function setStatus(state, text) {
    statusDot.className   = state;
    statusLabel.textContent = text;
  }

  function formatPrice(p) {
    if (p == null) return '—';
    return 'Rp ' + Number(p).toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function hasTradePlan(s) {
    return s.entry != null || s.tp != null || s.sl != null;
  }

  /* ─── helper: build MTF section for modal ─── */
  function buildMtfSection(s) {
    const mtf = s._meta?.mtf;
    if (!mtf || mtf.confluence === 'NO_DATA') return '';

    const confClsMap = { 'STRONG_BUY': 'mtf-strong-buy', 'BUY': 'mtf-buy', 'STRONG_SELL': 'mtf-strong-sell', 'SELL': 'mtf-sell', 'CONFLICT': 'mtf-conflict', 'NEUTRAL': 'mtf-neutral' };
    const confLblMap = { 'STRONG_BUY': '⬆⬆ Strong Buy', 'BUY': '⬆ Buy', 'STRONG_SELL': '⬇⬇ Strong Sell', 'SELL': '⬇ Sell', 'CONFLICT': '⚠ Conflict', 'NEUTRAL': '⏸ Neutral' };
    const confCls = confClsMap[mtf.confluence] || 'mtf-neutral';
    const confLbl = confLblMap[mtf.confluence] || mtf.confluence;

    function tfRow(key, label) {
      const tf = mtf[key];
      if (!tf || tf.status !== 'ok') return `
        <div class="mtf-tf-row">
          <div class="mtf-tf-label">${label}</div>
          <div class="mtf-tf-details"><span style="color:var(--text-muted)">Data tidak tersedia</span></div>
        </div>`;

      const biasCls = tf.bias === 'BULLISH' ? 'bull' : tf.bias === 'BEARISH' ? 'bear' : 'neut';
      return `
        <div class="mtf-tf-row">
          <div class="mtf-tf-label">${label}</div>
          <div class="mtf-tf-details">
            <span>RSI ${tf.rsi ?? '—'}</span>
            <span>MA20 ${tf.ma20 ?? '—'}</span>
            <span>MA50 ${tf.ma50 ?? '—'}</span>
            <span class="mtf-bias-tag ${biasCls}">${tf.bias}</span>
          </div>
        </div>`;
    }

    return `
      <div class="modal-section">
        <div class="modal-section-title">📊 Multi-Timeframe Analysis</div>
        <div style="margin-bottom:10px;">
          <span class="mtf-badge ${confCls}" style="font-size:13px;padding:6px 16px;">${confLbl}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-left:8px;">Score: ${mtf.confluence_score ?? 0}</span>
        </div>
        ${tfRow('weekly', 'Weekly')}
        ${tfRow('daily', 'Daily')}
        ${tfRow('intraday', '1 Hour')}
        <div style="margin-top:10px;font-size:12px;line-height:1.6;color:var(--text-dim);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:12px;">
          💡 ${mtf.summary || '—'}
        </div>
      </div>`;
  }

  /* ─── helper: sort signals sama seperti bot ─── */
  function sortSignals(signals) {
    return [...signals].sort((a, b) => {
      const scoreDiff = (b.score ?? 0) - (a.score ?? 0);
      if (scoreDiff !== 0) return scoreDiff;
      const smDiff = (b.smart_money ? 1 : 0) - (a.smart_money ? 1 : 0);
      if (smDiff !== 0) return smDiff;
      return (b.gap_up ? 1 : 0) - (a.gap_up ? 1 : 0);
    });
  }

  /* ─── STATE: filter & show-all ─── */

      const mtfConf = mtf?.confluence || null;
      const mtfBadgeHTML = mtfConf ? (() => {
        const clsMap = { 'STRONG_BUY': 'mtf-strong-buy', 'BUY': 'mtf-buy', 'STRONG_SELL': 'mtf-strong-sell', 'SELL': 'mtf-sell', 'CONFLICT': 'mtf-conflict', 'NEUTRAL': 'mtf-neutral' };
        const lblMap = { 'STRONG_BUY': '⬆⬆ MTF Strong Buy', 'BUY': '⬆ MTF Buy', 'STRONG_SELL': '⬇⬇ MTF Strong Sell', 'SELL': '⬇ MTF Sell', 'CONFLICT': '⚠ MTF Conflict', 'NEUTRAL': '⏸ MTF Neutral', 'NO_DATA': '— MTF No Data' };
        const cls = clsMap[mtfConf] || 'mtf-neutral';
        const lbl = lblMap[mtfConf] || mtfConf;
        return `<div class="mtf-badge ${cls}">${lbl}</div>`;
      })() : '';

      const medal    = RANK_MEDALS[i]  || '🏅';
      const rankLbl  = RANK_LABELS[i]  || `#${i+1}`;

      // Score bar (maks 10)
      const scorePct = Math.min(100, Math.round((score / 10) * 100));
      const scoreColor = score >= 6 ? '#00d97e' : score >= 4 ? '#f59e0b' : '#64748b';

      // Signal CSS class
      const sigClass = sig === 'BUY' ? 'BUY' : sig === 'SELL' ? 'SELL' : 'HOLD';

      // RRR data
      const rrr     = s.rrr || {};
      const rrrVal  = rrr.rrr != null ? Number(rrr.rrr).toFixed(2) : null;
      const rrrFlag = rrr.flag || '';
      const sup20   = s._meta?.support_20 != null ? Number(s._meta.support_20).toFixed(0) : '—';
      const res20   = s._meta?.resistance_20 != null ? Number(s._meta.resistance_20).toFixed(0) : '—';
      const rrrColor = rrrFlag === 'BAD_RRR' ? 'var(--sell)' : rrrVal && Number(rrrVal) > 2.0 ? 'var(--buy)' : 'var(--text)';
      const rrrBadgeHTML = rrrVal ? `
          <div class="metric-chip" style="border-color: ${rrrFlag === 'BAD_RRR' ? 'var(--sell)' : rrrVal > 2.0 ? 'var(--buy)' : 'var(--border-2)'}">
            <span class="label">RRR</span>
            <span class="value" style="color:${rrrColor}">${rrrVal}${rrrFlag === 'BAD_RRR' ? ' ⚠️' : rrrVal > 2.0 ? ' ✅' : ''}</span>
          </div>` : '';

      // Trade plan preview (compact — detail di modal)
      const planPreview = hasTradePlan(s) ? `
        <div style="padding:6px 22px 0;display:flex;gap:12px;font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">
          <span>Entry ${formatPrice(s.entry)}</span>
          <span style="color:var(--buy)">TP ${formatPrice(s.tp)}</span>
          <span style="color:var(--sell)">SL ${formatPrice(s.sl)}</span>
        </div>
        <div style="padding:3px 22px 0;display:flex;gap:12px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;">
          <span>S20 ${sup20}</span>
          <span>R20 ${res20}</span>
        </div>` : '';

      return `
      <article class="signal-card ${sigClass}" style="animation-delay:${i * 0.07}s" data-rank="${i+1}" data-idx="${realIdx}">

        <!-- RANK BADGE -->
        <div class="rank-badge rank-${Math.min(i+1, 5)}">
          <span class="rank-medal">${medal}</span>
          <span class="rank-label">${rankLbl}</span>
        </div>

        <!-- HEADER -->
        <div class="card-header">
          <div class="card-left">
            <span class="card-ticker">${s.ticker || '—'}</span>
            <span class="card-price">${formatPrice(s.harga ?? s.price)}</span>
          </div>
          <span class="badge-signal ${sigClass}">${sig}</span>
        </div>

        <!-- SCORE BAR -->
        <div class="score-bar-wrap">
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${scorePct}%;background:${scoreColor}"></div>
          </div>
          <span class="score-bar-label">Score <strong>${score}</strong>/10</span>
        </div>

        <!-- METRICS ROW -->
        <div class="card-metrics">
          <div class="metric-chip">
            <span class="label">RSI</span>
            <span class="value ${rsiClass}">${rsi}</span>
          </div>
          <div class="metric-chip">
            <span class="label">MA20</span>
            <span class="value">${ma20}</span>
          </div>
          <div class="metric-chip">
            <span class="label">MA50</span>
            <span class="value">${ma50}</span>
          </div>
          <div class="metric-chip">
            <span class="label">ATR</span>
            <span class="value">${atr}</span>
          </div>
          ${macdStratSig ? `<div class="metric-chip" style="border-color:${macdStratSig==='BUY'?'var(--buy)':macdStratSig==='SELL'?'var(--sell)':'var(--border)'};">
            <span class="label">MACD</span>
            <span class="value" style="color:${macdStratSig==='BUY'?'var(--buy)':macdStratSig==='SELL'?'var(--sell)':'var(--text-muted)'}">${macdStratSig}</span>
          </div>` : ''}
          ${bollStratSig ? `<div class="metric-chip" style="border-color:${bollStratSig==='BUY'?'var(--buy)':bollStratSig==='SELL'?'var(--sell)':'var(--border)'};">
            <span class="label">Bollinger</span>
            <span class="value" style="color:${bollStratSig==='BUY'?'var(--buy)':bollStratSig==='SELL'?'var(--sell)':'var(--text-muted)'}">${bollStratSig}</span>
          </div>` : ''}
          <div class="metric-chip" style="border-color: var(--accent);">
            <span class="label">Strategi</span>
            <span class="value" style="color: var(--accent);">${s.multi_confirmation || 'N/A'}</span>
          </div>
          ${rrrBadgeHTML}

          <!-- Smart Money badge -->
          <div class="badge-feature ${sm ? 'sm-on' : 'sm-off'}">
            ${sm
              ? `🔥 <strong>Smart Money</strong><span class="feat-sub">${smLabel}${smConf ? ' · ' + smConf : ''}</span>`
              : `<span class="feat-off">— Smart Money</span>`
            }
          </div>

          <!-- Gap Up badge -->
          <div class="badge-feature ${gap ? 'gu-on' : 'gu-off'}">
            ${gap
              ? `🚀 <strong>Gap Up</strong><span class="feat-sub">${guConf || 'DETECTED'}</span>`
              : `<span class="feat-off">— Gap Up</span>`
            }
          </div>

          <!-- MTF badge -->
          ${mtfBadgeHTML}

          <!-- Gate Decision badge -->
          ${(() => {
            const gate = s.gate;
            if (!gate || !gate.decision) return `<div class="badge-feature gate-none"><span class="feat-off">— Final Gate</span></div>`;
            const d = gate.decision;
            const icon = d === 'EXECUTE' ? '✅' : d === 'WAIT' ? '⏳' : '🚫';
            const cls = d === 'EXECUTE' ? 'gate-execute' : d === 'WAIT' ? 'gate-wait' : 'gate-skip';
            return `<div class="badge-feature ${cls}">${icon} <strong>${d}</strong></div>`;
          })()}
        </div>

        <!-- REASON TAGS -->
        ${reasonTagsHTML}

        <div class="card-divider" style="margin-top:12px;"></div>
        ${planPreview}
        ${aiSummary}

        <!-- VIEW DETAIL BUTTON -->
        <div style="padding:12px 22px 18px;">
          <button onclick="window.open('/analysis/' + encodeURIComponent('${s.ticker || ""}'), '_blank')" style="
            width:100%; padding:10px;
            background:var(--surface-2); border:1px solid var(--border-2);
            border-radius:10px; color:var(--text-muted);
            font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
            cursor:pointer; transition:all 0.2s;
            display:flex; align-items:center; justify-content:center; gap:6px;
          " onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border-2)';this.style.color='var(--text-muted)'">
            📋 Lihat Detail Analisa
          </button>
        </div>
      </article>`;
    }).join('');
  }

  function updateStats(signals) {
    if (!signals) return;
    const buy  = signals.filter(s => s.signal === 'BUY').length;
    const sell = signals.filter(s => s.signal === 'SELL').length;
    const sm   = signals.filter(s => s.smart_money).length;
    const gap  = signals.filter(s => s.gap_up).length;

    document.getElementById('stat-total').textContent = signals.length;
    document.getElementById('stat-buy').textContent   = buy;
    document.getElementById('stat-sell').textContent  = sell;
    document.getElementById('stat-sm').textContent    = sm;
    document.getElementById('stat-gap').textContent   = gap;
  }

  async function forceRescan() {
    const btn = document.getElementById('rescan-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Scanning...';
    btn.style.background = '#6b7280';
    try {
      const res = await fetch('/rescan', { method: 'POST' });
      const data = await res.json();
      if (data.status === 'started') {
        setStatus('loading', 'Rescan dimulai...');
      } else {
        alert(data.message || 'Rescan gagal');
      }
    } catch (e) {
      alert('Gagal memulai rescan: ' + e.message);
    }
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '🔄 Rescan';
      btn.style.background = '#f59e0b';
    }, 30000);
  }

  async function fetchSignals() {
    setStatus('loading', 'Memperbarui...');
    try {
      const res  = await fetch('/signals');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const signals    = data.signals || [];
      const marketOpen = data.market_open ?? null;
      const scanning   = data.scanning   ?? false;

      // Market status banner — jujur sesuai kondisi nyata
      const banner = document.getElementById('market-banner');
      if (signals.length > 0) {
        // Ada data — tampilkan status bursa
        if (marketOpen === true) {
          banner.style.display = 'flex';
          banner.className = 'open';
          banner.innerHTML = '🟢 <strong>Bursa IDX BUKA</strong> &nbsp;— data real-time aktif';
        } else {
          banner.style.display = 'flex';
          banner.className = 'closed';
          banner.innerHTML = '🔵 <strong>Bursa IDX TUTUP</strong> &nbsp;— menampilkan data analisis terakhir yang tersimpan';
        }
      } else if (scanning) {
        // Sedang scan, belum ada data
        banner.style.display = 'flex';
        banner.className = 'closed';
        banner.innerHTML = '⏳ <strong>Sedang melakukan scan saham...</strong> &nbsp;Halaman akan otomatis refresh saat data siap.';
      } else {
        banner.style.display = 'none';
      }

      // Simpan ke state global
      _allSignals = sortSignals(signals);

      // Stats & filter counts
      updateStats(signals);
      updateFilterCounts(signals);

      // Render cards dengan filter & show-all state
      renderCards(_allSignals, scanning);

      const dispCount = _showAll ? signals.length : Math.min(5, signals.length);
      const now = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      if (signals.length > 0) {
        lastUpdate.textContent = `Terakhir diperbarui: ${now} WIB • ${dispCount} dari ${signals.length} saham`;
      } else {
        lastUpdate.textContent = '';
      }

      setStatus('live', 'Live');
      // Jika sedang scan dan belum ada data, refresh lebih cepat (setiap 15 detik)
      secondsLeft = (scanning && signals.length === 0) ? 15 : REFRESH_INTERVAL + 1;

    } catch (err) {
      console.error(err);
      setStatus('error', 'Gagal memuat');
      document.getElementById('cards-grid').innerHTML = `
        <div class="state-block">
          <div class="emoji">⚠️</div>
          <p>Gagal terhubung ke API.<br/>Pastikan server <code>python app.py</code> berjalan.<br/><small style="color:var(--text-muted)">${err.message}</small></p>
        </div>`;
    }
  }

  // Initial load
  fetchSignals();

  /* ───────────────────────────────────────────
     TRADING PERFORMANCE
  ─────────────────────────────────────────── */
  async function fetchPerformance() {
    try {
      const res  = await fetch('/performance');
      if (!res.ok) return;
      const data = await res.json();

      const totalEl   = document.getElementById('perf-total');
      const winrateEl = document.getElementById('perf-winrate');
      const profitEl  = document.getElementById('perf-profit');

      totalEl.textContent = data.total_trade ?? '—';

      const wr = data.winrate ?? null;
      winrateEl.textContent = wr !== null ? wr + '%' : '—';
      winrateEl.className = 'perf-card-value ' + (wr >= 50 ? 'positive' : wr !== null ? 'negative' : 'neutral');

      const pr = data.total_profit ?? null;
      profitEl.textContent = pr !== null ? (pr >= 0 ? '+' : '') + pr + '%' : '—';
      profitEl.className = 'perf-card-value ' + (pr > 0 ? 'positive' : pr < 0 ? 'negative' : 'neutral');

    } catch (e) {
      console.warn('Performance fetch failed:', e);
    }
  }

  fetchPerformance();

  /* ───────────────────────────────────────────
     TRADINGVIEW EMBED WIDGET
  ─────────────────────────────────────────── */
  let currentSymbol   = 'IDX:BBCA';
  let currentInterval = 'D';

  // SYMBOL_MAP dihapus — generate IDX: prefix secara dinamis dari ticker apapun

  function setInterval_(interval) {
    currentInterval = interval;
    document.querySelectorAll('.interval-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.interval === interval);
    });
    buildChart(currentSymbol, currentInterval);
  }

  function onStockChange(symbol) {
    currentSymbol = symbol;
    buildChart(currentSymbol, currentInterval);
  }

  function buildChart(symbol, interval) {
    const container = document.getElementById('tradingview_widget_container');

    // TradingView widgetembed iframe — works on any domain including localhost
    const src = 'https://s.tradingview.com/widgetembed/?' +
      'symbol=' + encodeURIComponent(symbol) +
      '&interval=' + encodeURIComponent(interval) +
      '&hidesidetoolbar=0' +
      '&symboledit=0' +
      '&saveimage=0' +
      '&toolbarbg=131722' +
      '&studies=RSI%40tv-basicstudies' +
      '&studies=MASimple%40tv-basicstudies' +
      '&theme=dark' +
      '&style=1' +
      '&timezone=Asia%2FJakarta' +
      '&locale=id' +
      '&utm_source=localhost';

    container.innerHTML =
      '<iframe id="tv-iframe" src="' + src + '" ' +
      'style="width:100%;height:100%;border:none;" ' +
      'allowtransparency="true" allowfullscreen></iframe>';
  }

  // Klik kartu sinyal → pindah chart ke saham tersebut (dinamis, tanpa hardcode)
  document.getElementById('cards-grid').addEventListener('click', e => {
    const card = e.target.closest('.signal-card');
    if (!card) return;
    const tickerEl = card.querySelector('.card-ticker');
    if (!tickerEl) return;

    const rawTicker = tickerEl.textContent.trim().split('.')[0];
    const tvSymbol = 'IDX:' + rawTicker;

    const sel = document.getElementById('stock-select');
    if (sel) sel.value = tvSymbol;

    document.getElementById('chart-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    currentSymbol = tvSymbol;
    buildChart(currentSymbol, currentInterval);
  });

  // Initial chart load
  buildChart(currentSymbol, currentInterval);
</script>
</body>
</html>
